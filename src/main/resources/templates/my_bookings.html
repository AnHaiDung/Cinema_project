<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Vé của tôi - CGV Cinema</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a th:href="@{/}" class="nav-brand"><span class="brand-icon">🎬</span> CGV Cinema</a>
    <div class="nav-links">
      <a th:href="@{/}" sec:authorize="!hasRole('ADMIN')" class="nav-link">🏠 Trang chủ</a>
      <a th:href="@{/my-bookings}" sec:authorize="hasRole('CUSTOMER')" class="nav-link active">🎟️ Vé của tôi</a>
      
      <a th:href="@{/showtimes}" sec:authorize="hasRole('ADMIN')" class="nav-link">🗓️ Lịch chiếu</a>
      <a th:href="@{/movies}" sec:authorize="hasRole('ADMIN')" class="nav-link">🎞️ Quản lý phim</a>
      <a th:href="@{/auditoriums}" sec:authorize="hasRole('ADMIN')" class="nav-link">🏟️ Phòng chiếu</a>
      
      <div class="nav-divider" sec:authorize="isAuthenticated()"></div>
      
      <div class="nav-user" sec:authorize="isAuthenticated()">
        <span class="user-badge">
          <span sec:authorize="hasRole('ADMIN')">👑 Admin: </span>
          <span sec:authorize="hasRole('CUSTOMER')">👤 Khách: </span>
          <span sec:authentication="name"></span>
        </span>
        <form th:action="@{/logout}" method="post" style="margin:0; display:inline-block;">
          <button class="btn btn-outline btn-sm" type="submit">Đăng xuất</button>
        </form>
      </div>
    </div>
  </div>
</nav>

<div class="main-container">
  <div class="page-header">
    <h1 class="page-title">🎟️ Lịch sử đặt vé</h1>
    <p class="page-subtitle">Xin chào, <strong th:text="${user.fullName}"></strong>! Đây là danh sách vé bạn đã đặt.</p>
  </div>

  <div th:if="${bookings.empty}" class="empty-state">
    <div class="empty-icon">🎟️</div>
    <h3>Bạn chưa đặt vé nào</h3>
    <p>Hãy khám phá những bộ phim hay và đặt vé ngay!</p>
    <a th:href="@{/}" class="btn btn-primary" style="margin-top:1rem;">🎬 Xem phim ngay</a>
  </div>

  <div class="booking-grid" th:unless="${bookings.empty}">
    <div th:each="booking : ${bookings}" class="booking-card">
      <div style="display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:start;">
        <div>
          <div style="font-size:0.7rem;color:#8b8fa8;font-weight:600;text-transform:uppercase;margin-bottom:0.25rem;">
            Mã vé #<span th:text="${booking.id}"></span>
          </div>
          <div style="font-size:1.1rem;font-weight:800;margin-bottom:0.75rem;" th:text="${booking.showtime.movie.title}"></div>

          <div style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:0.75rem;">
            <span style="font-size:0.8rem;color:#8b8fa8;">
              🕐 <span th:text="${#temporals.format(booking.showtime.startsAt, 'HH:mm dd/MM/yyyy')}"></span>
            </span>
            <span style="font-size:0.8rem;color:#8b8fa8;">
              🏟️ <span th:text="${booking.showtime.auditorium.name}"></span>
            </span>
            <span style="font-size:0.8rem;color:#8b8fa8;">
              💺 <span th:text="${booking.seats}"></span>
            </span>
          </div>
          <div style="font-size:0.78rem;color:#555870;">
            Đặt lúc: <span th:text="${#temporals.format(booking.bookingDate, 'HH:mm dd/MM/yyyy')}"></span>
          </div>
        </div>
        <div style="text-align:right;">
          <div class="price" style="font-size:1.1rem;" th:text="${#numbers.formatDecimal(booking.totalPrice, 0, 'COMMA', 0, 'POINT') + ' đ'}"></div>
          <div style="font-size:0.75rem;color:#8b8fa8;margin-top:0.25rem;"
               th:text="${#strings.listSplit(booking.seats, ',').size() + ' ghế'}"></div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
